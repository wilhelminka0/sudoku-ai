<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Sudoku s AI pomocníkem</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #1a2b3c; margin-bottom: 20px; }
        .controls { margin-bottom: 20px; }
        button { padding: 10px 20px; margin: 0 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .btn-easy { background-color: #2ecc71; color: white; }
        .btn-medium { background-color: #f1c40f; color: white; }
        .btn-hard { background-color: #e74c3c; color: white; }
        .btn-ai { background-color: #3498db; color: white; margin-top: 20px; padding: 15px 30px; font-size: 18px; }
        
        /* Mřížka Sudoku */
        .sudoku-grid { 
            display: grid; 
            grid-template-columns: repeat(9, 50px); 
            border: 3px solid #1a2b3c; 
            background-color: #1a2b3c;
            gap: 0;
        }

        .sudoku-cell {
            width: 50px; height: 50px; background: white; border: 0.5px solid #bfc9d4;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: bold; cursor: pointer; box-sizing: border-box;
        }

        /* TLUSTÉ ČÁRY PRO ČTVERCE 3x3 */
        .sudoku-cell:nth-child(3n) { border-right: 3px solid #1a2b3c; }
        .sudoku-cell:nth-child(n+19):nth-child(-n+27), 
        .sudoku-cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 3px solid #1a2b3c; }

        .sudoku-cell.fixed { background-color: #f1f3f5; color: #1a2b3c; cursor: default; }
        .sudoku-cell.selected { background-color: #a5d8ff !important; outline: 2px solid #228be6; z-index: 10; }
        
        #ai-response { margin-top: 20px; max-width: 500px; padding: 15px; background: white; border-radius: 8px; border-left: 5px solid #3498db; display: none; line-height: 1.5; }
    </style>
</head>
<body>
    <h1>Sudoku s AI pomocníkem</h1>
<div style="background: #e9ecef; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-family: sans-serif; border: 1px solid #ccc;">
    <strong>📊 Statistiky:</strong> AI už poradila celkem <span>{{ dotazy }}</span> krát.
    <div class="controls">
        <button class="btn-easy" onclick="generateGame('easy')">Lehká</button>
        <button class="btn-medium" onclick="generateGame('medium')">Střední</button>
        <button class="btn-hard" onclick="generateGame('hard')">Těžká</button>
    </div>
    <div id="grid" class="sudoku-grid"></div>
    <button class="btn-ai" onclick="getAIHint()">AI Poradit s polem</button>
    <div id="ai-response"></div>

    <script>
        let initialBoard = Array(81).fill(0);
        let currentBoard = Array(81).fill(0);
        let selectedIdx = null;

        // Neprůstřelná základní deska, která nikdy neshodí prohlížeč
        const baseBoard = [
            5,3,4,6,7,8,9,1,2,
            6,7,2,1,9,5,3,4,8,
            1,9,8,3,4,2,5,6,7,
            8,5,9,7,6,1,4,2,3,
            4,2,6,8,5,3,7,9,1,
            7,1,3,9,2,4,8,5,6,
            9,6,1,5,3,7,2,8,4,
            2,8,7,4,1,9,6,3,5,
            3,4,5,2,8,6,1,7,9
        ];

        // Funkce pro zamíchání čísel - zajistí, že každá hra je jiná
        function shuffleBoard(board) {
            let newBoard = [...board];
            let map = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
            for(let k=0; k<81; k++) {
                newBoard[k] = map[newBoard[k]-1];
            }
            return newBoard;
        }

        function generateGame(diff) {
            let fullBoard = shuffleBoard(baseBoard);
            let removeCount = { 'easy': 30, 'medium': 45, 'hard': 55 }[diff];
            let board = [...fullBoard];

            while (removeCount > 0) {
                let idx = Math.floor(Math.random() * 81);
                if (board[idx] !== 0) {
                    board[idx] = 0;
                    removeCount--;
                }
            }
            initialBoard = [...board];
            currentBoard = [...board];
            selectedIdx = null;
            render();
        }

        function render() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            currentBoard.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'sudoku-cell' + (initialBoard[i] !== 0 ? ' fixed' : '');
                cell.innerText = val !== 0 ? val : '';
                cell.onclick = () => {
                    document.querySelectorAll('.sudoku-cell').forEach(c => c.classList.remove('selected'));
                    cell.classList.add('selected');
                    selectedIdx = i;
                };
                container.appendChild(cell);
            });
            if (selectedIdx !== null) {
                document.querySelectorAll('.sudoku-cell')[selectedIdx].classList.add('selected');
            }
        }

        // Poslouchání klávesnice pro zadávání čísel
        document.addEventListener('keydown', (e) => {
            if (selectedIdx === null || initialBoard[selectedIdx] !== 0) return; 
            
            if (e.key >= '1' && e.key <= '9') {
                currentBoard[selectedIdx] = parseInt(e.key);
                render();
            } else if (e.key === 'Backspace' || e.key === 'Delete') {
                currentBoard[selectedIdx] = 0;
                render();
            }
        });

        async function getAIHint() {
            if (selectedIdx === null) return alert("Vyber políčko!");
            if (initialBoard[selectedIdx] !== 0) return alert("S tímhle polem AI radit nemusí, už je předvyplněné.");

            const respDiv = document.getElementById('ai-response');
            respDiv.style.display = 'block';
            respDiv.innerText = "AI přemýšlí...";
            
            const res = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    question: `Hraju Sudoku. Deska: ${currentBoard.join('')}. Vybral jsem pole na indexu ${selectedIdx}. Co tam mám doplnit a proč?`
                })
            });
            const data = await res.json();
            respDiv.innerText = data.response;
        }
        generateGame('easy');
    </script>
</body>
</html>
